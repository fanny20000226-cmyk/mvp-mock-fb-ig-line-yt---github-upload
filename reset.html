<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>正在重置快取</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7fbff;font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei",sans-serif;color:#182130}
    .card{width:min(420px,calc(100% - 32px));background:#fff;border-radius:22px;padding:24px;box-shadow:0 14px 38px rgba(31,57,97,.12);text-align:center}
    button{min-height:48px;border:0;border-radius:14px;padding:12px 18px;background:#1f8ff5;color:#fff;font-weight:900}
  </style>
</head>
<body>
  <section class="card">
    <h1>正在重置快取</h1>
    <p>如果系統剛剛打不開，這裡會清除舊版離線快取並重新載入新版。</p>
    <button id="go">立即回新版</button>
  </section>
  <script>
    async function resetAndGo() {
      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((reg) => reg.unregister()));
        }
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
      } catch (error) {}
      location.replace("./index.html?fresh=reset-v19-" + Date.now());
    }
    document.getElementById("go").addEventListener("click", resetAndGo);
    resetAndGo();
  </script>
</body>
</html>
